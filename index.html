<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
    <title>TripCast Map Test</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;600;700&display=swap"
    />
    <script>
      // Pre-React paint: pick a night/day background before the bundle loads
      // so the page doesn't flash white on cold start. Mirrors the fallback
      // window used by ThemeProvider's resolveAutoTheme (night = 21:00–06:00,
      // viewer device tz). React's applyThemeVariables overwrites this on
      // mount with the full token set.
      (function () {
        try {
          var stored = localStorage.getItem("tripcast.theme_mode");
          var isNight;
          if (stored === "meadow") isNight = false;
          else if (stored === "constellation") isNight = true;
          else {
            var h = new Date().getHours();
            isNight = h >= 21 || h < 6;
          }
          var bg = isNight ? "#1c1f3a" : "#fdf6e3";
          var theme = isNight ? "constellation" : "meadow";
          document.documentElement.setAttribute("data-theme", theme);
          if (isNight) {
            document.documentElement.classList.add("theme-dark");
            document.documentElement.classList.add("dark");
          } else {
            document.documentElement.classList.remove("theme-dark");
            document.documentElement.classList.remove("dark");
          }
          document.documentElement.style.backgroundColor = bg;
          document.documentElement.style.colorScheme = isNight ? "dark" : "light";
        } catch (e) { /* localStorage / Date can fail in odd embed envs */ }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
